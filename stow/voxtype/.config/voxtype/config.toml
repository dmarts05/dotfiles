state_file = "auto"

[hotkey]
key = "SCROLLLOCK"
modifiers = []
enabled = false

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 300

# [audio.feedback]
# enabled = true
# theme = "default"
# volume = 0.7

[whisper]
model = "large-v3-turbo"
language = ["en", "es"]
translate = false
# threads = 4
# initial_prompt = ""

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0
# auto_submit = true
shift_enter_newlines = true

[output.notification]
on_recording_start = true
on_recording_stop = true
on_transcription = true

# [text]
# spoken_punctuation = false
# replacements = { "vox type" = "voxtype" }
# smart_auto_submit = false

# [vad]
# enabled = false
# threshold = 0.5
# min_speech_duration_ms = 100

# [status]
# icon_theme = "emoji"

# --- Profiles ---

[profiles.translate_mode]
post_process_command = "bash -c '{ echo \"You are an expert translator. Translate the provided text into English. Your task is to output ONLY the translated text. Do NOT wrap the output in quotes or code blocks. Do NOT provide any explanations, notes, or conversational text. The text to translate is: \"; cat; } | ollama run llama3.2:3b'"

[profiles.code_snippet]
post_process_command = "bash -c '{ echo \"You are an expert developer and system administrator. The user will provide a request. Your task is to output ONLY the raw, executable command or code snippet that fulfills this request. Crucial instructions: Do NOT wrap the output in markdown code blocks or backticks. Do NOT provide any explanations, notes, or conversational text. Output ONLY the exact code or command: \"; cat; } | ollama run llama3.2:3b'"
