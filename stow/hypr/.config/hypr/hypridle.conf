general {
    lock_cmd = ~/.config/hypr/scripts/lock-screen
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3
}

# Hypridle refuses to start without at least one listener.
# Keep this no-op rule so hypridle can handle sleep/lock events without
# adding real idle management.
listener {
    timeout = 86400
    on-timeout = true
}
