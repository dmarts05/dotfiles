
[cursor.style]
blinking = "On"
shape = "Beam"

[cursor.vi_mode_style]
shape = "Block"

[font]
size = 15.0

[font.bold]
style = "Bold"

[font.bold_italic]
style = "Bold Italic"

[font.italic]
style = "Italic"

[font.normal]
family = "Noto Sans Mono"
style = "Regular"

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[window]
decorations = "none"

[window.padding]
x = 10
y = 10

[general]
live_config_reload = false
import = ["/home/kmp/.config/alacritty/catppuccin-mocha.toml"]
